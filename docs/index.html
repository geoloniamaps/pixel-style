<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ドット絵風マップスタイル プレビュー</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: sans-serif;
    }
    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1;
      background: rgba(60, 40, 20, 0.9);
      color: #f0e8c8;
      padding: 12px 16px;
      border-radius: 4px;
      border: 2px solid #8a7840;
      font-size: 14px;
      max-width: 280px;
      image-rendering: pixelated;
    }
    #controls p {
      margin: 4px 0;
      color: #c8b870;
      font-size: 12px;
    }
    .geolonia {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="controls">
    <strong>Pixel Art Style</strong>
    <p>RPG風のドット絵スタイル。冒険の地図へようこそ！</p>
  </div>
  <div
    id="map"
    class="geolonia"
    data-style="./style.json"
    data-lat="35.68"
    data-lng="139.77"
    data-zoom="13"
  ></div>
  <script src="https://cdn.geolonia.com/v1/embed?geolonia-api-key=YOUR-API-KEY"></script>
</body>
</html>
