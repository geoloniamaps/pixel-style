id: highway-major
type: line
source: geolonia
source-layer: transportation
minzoom: 8
filter:
  - all
  - - '!in'
    - brunnel
    - bridge
    - tunnel
  - - in
    - class
    - primary
    - secondary
    - tertiary
    - trunk
layout:
  line-cap: butt
  line-join: miter
paint:
  line-color: '#d8c880'
  line-width:
    - interpolate
    - - exponential
      - 0.9
    - - zoom
    - 6
    - 0.5
    - 12
    - 1.5
    - 14
    - 3.5
    - 16
    - 10
    - 18
    - 18
    - 20
    - 140
