id: road-name
type: symbol
source: geolonia
source-layer: transportation_name
minzoom: 12
filter:
  - all
  - - ==
    - network
    - road
  - - in
    - class
    - trunk
    - primary
    - secondary
    - tertiary
  - - '!in'
    - brunnel
    - tunnel
layout:
  text-font:
    - Noto Sans Universal Bold
  text-size: 12
  text-field: '{name}'
  text-max-width: 8
  text-padding: 50
  symbol-placement: line
  symbol-spacing:
    base: 1000
    stops:
      - - 10
        - 1000
      - - 12
        - 800
      - - 15
        - 600
paint:
  text-color: '#3a2a10'
  text-halo-width: 2
  text-halo-color: '#d8c880'
