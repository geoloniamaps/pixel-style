id: place-village
type: symbol
source: geolonia
source-layer: place
minzoom: 12
filter:
  - all
  - - ==
    - class
    - village
layout:
  text-font:
    - Noto Sans Universal Bold
  text-size: 11
  text-field: '{name}'
  text-max-width: 6
  text-padding: 20
  text-letter-spacing: 0.05
paint:
  text-color: '#f0e8c8'
  text-halo-width: 2
  text-halo-color: '#4a3a18'
