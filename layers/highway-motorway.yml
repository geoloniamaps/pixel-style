id: highway-motorway
type: line
source: geolonia
source-layer: transportation
filter:
  - all
  - - ==
    - $type
    - LineString
  - - '!in'
    - brunnel
    - bridge
    - tunnel
  - - ==
    - class
    - motorway
layout:
  line-cap: butt
  line-join: miter
paint:
  line-color: '#c8a040'
  line-width:
    - interpolate
    - - exponential
      - 0.9
    - - zoom
    - 5
    - 0.2
    - 8
    - 0.6
    - 14
    - 3.5
    - 16
    - 10
    - 18
    - 18
    - 20
    - 140
