id: place-city
type: symbol
source: geolonia
source-layer: place
filter:
  - all
  - - ==
    - class
    - city
layout:
  text-font:
    - Noto Sans Universal Bold
  text-size:
    stops:
      - - 5
        - 13
      - - 10
        - 18
  text-field: '{name}'
  text-max-width: 6
  text-padding: 30
  text-letter-spacing: 0.1
paint:
  text-color: '#f8f0d0'
  text-halo-width: 3
  text-halo-color: '#3a2a10'
