id: highway-motorway-casing
type: line
source: geolonia
source-layer: transportation
filter:
  - all
  - - ==
    - $type
    - LineString
  - - '!in'
    - brunnel
    - bridge
    - tunnel
  - - ==
    - class
    - motorway
layout:
  line-cap: butt
  line-join: miter
paint:
  line-color: '#5a3a1a'
  line-width:
    - interpolate
    - - exponential
      - 0.9
    - - zoom
    - 5
    - 1
    - 6
    - 1
    - 14
    - 5
    - 16
    - 14
    - 18
    - 22
    - 20
    - 150
