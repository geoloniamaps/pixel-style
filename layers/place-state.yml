id: place-state
type: symbol
source: geolonia
source-layer: place
filter:
  - all
  - - ==
    - class
    - state
layout:
  text-font:
    - Noto Sans Universal Bold
  text-size:
    stops:
      - - 4
        - 10
      - - 8
        - 14
  text-field: '{name}'
  text-max-width: 6
  text-padding: 30
  text-letter-spacing: 0.1
paint:
  text-color: '#f0e0b0'
  text-halo-width: 2.5
  text-halo-color: '#4a3a18'
